name: Refresh baseline

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC
    - cron: "0 18 * * *"  # 18:00 UTC
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build baseline
        env:
          CBL_PACE: "2"
        run: python pipeline/build_data.py --server europe --out docs/data/baseline.json

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/baseline.json
          git diff --cached --quiet || git commit -m "baseline refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
